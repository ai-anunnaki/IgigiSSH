name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # 支持手动触发

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: |
          ELECTRON_MIRROR="https://npmmirror.com/mirrors/electron/" \
          npm install --legacy-peer-deps

      - name: 构建 React
        run: CI=false npx react-scripts build

      - name: 打包 macOS（通用二进制）
        run: npx electron-builder --mac --universal
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/*.dmg
            dist/*.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm install --legacy-peer-deps
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: 构建 React
        run: npx react-scripts build
        env:
          CI: false

      - name: 打包 Windows（NSIS 安装包 + 便携版）
        run: npx electron-builder --win nsis portable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装系统依赖
        run: |
          sudo apt update
          sudo apt install -y rpm fakeroot

      - name: 安装 Node 依赖
        run: |
          ELECTRON_MIRROR="https://npmmirror.com/mirrors/electron/" \
          npm install --legacy-peer-deps

      - name: 构建 React
        run: CI=false npx react-scripts build

      - name: 打包 Linux（AppImage + deb）
        run: npx electron-builder --linux AppImage deb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/*.AppImage
            dist/*.deb

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
